name: Backend CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint + Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Lint with ruff
        run: uv run ruff check src

      - name: Format check with ruff
        run: uv run ruff format --check src

      - name: Typecheck with mypy
        run: uv run mypy src
        continue-on-error: true  # remove once domain stubs are typed cleanly

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: agente
          POSTGRES_PASSWORD: agente_test
          POSTGRES_DB: agente_citas_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agente -d agente_citas_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql+asyncpg://agente:agente_test@localhost:5432/agente_citas_test
      REDIS_URL: redis://localhost:6379/0
      ANTHROPIC_API_KEY: test-key
      JWT_SECRET_KEY: test-secret-for-ci-only
      LOG_LEVEL: warning

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -q
        continue-on-error: true  # remove once at least one test exists
